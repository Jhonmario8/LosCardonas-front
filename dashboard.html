<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Cardonas · Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2024%2024%27%3E%3Crect%20width%3D%2724%27%20height%3D%2724%27%20rx%3D%276%27%20fill%3D%27%23146C6B%27/%3E%3Cpath%20fill%3D%27%23ffffff%27%20d%3D%27M12%205.1c-1.5%200-2.5.68-3.3.68-.82%200-1.5-.46-2.03-.46-.4%200-.68.32-.68.75%200%201.54.54%203%20.68%204.57.21%201.68.46%204.1%201.64%205.39.36.4.75.36%201-.11.54-1%20.68-2.68%201.07-3.79.21-.6.6-.89%201.61-.89s1.39.29%201.61.89c.39%201.11.54%202.79%201.07%203.79.25.46.64.5%201%20.11%201.18-1.29%201.43-3.71%201.64-5.39.14-1.57.68-3.03.68-4.57%200-.43-.29-.75-.68-.75-.54%200-1.21.46-2.03.46-.79%200-1.79-.68-3.3-.68Z%27/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/styles.css?v=8">
</head>
<body>

<div class="app-shell">
  <aside id="sidebar"></aside>
  <div class="main-col">
    <header id="topbar"></header>

    <div id="loadingState" class="empty-state">
      <i class="bi bi-hourglass-split"></i>
      <div class="empty-title">Cargando resumen del día…</div>
    </div>

    <div id="dashboardContent" style="display:none;">
      <div class="stat-grid">
        <div class="card-surface stat-tile">
          <div class="stat-label">Citas de hoy</div>
          <div class="stat-value" id="statTotalCitas">0</div>
        </div>
        <div class="card-surface stat-tile">
          <div class="stat-label">Recaudado hoy</div>
          <div class="stat-value accent" id="statRecaudado">$0</div>
        </div>
        <div class="card-surface stat-tile">
          <div class="stat-label">Citas por estado</div>
          <div class="status-mini-row" id="statusBreakdown"></div>
        </div>
      </div>

      <div class="card-surface earnings-card">
        <div class="earnings-head">
          <div class="period-toggle" id="periodToggle">
            <button type="button" data-period="WEEKLY" class="active">Semana</button>
            <button type="button" data-period="MONTHLY">Mes</button>
            <button type="button" data-period="YEARLY">Año</button>
          </div>
          <div class="earnings-nav">
            <button class="icon-btn" id="earningsPrevBtn" title="Periodo anterior"><i class="bi bi-chevron-left"></i></button>
            <span class="earnings-range" id="earningsRange">—</span>
            <div class="earnings-month-picker" id="earningsMonthPicker" style="display:none;">
              <select class="form-select" id="earningsMonthSelect"></select>
              <select class="form-select" id="earningsYearSelect"></select>
            </div>
            <div class="earnings-month-picker" id="earningsYearOnlyPicker" style="display:none;">
              <select class="form-select" id="earningsYearOnlySelect"></select>
            </div>
            <button class="icon-btn" id="earningsNextBtn" title="Periodo siguiente"><i class="bi bi-chevron-right"></i></button>
            <button class="btn-ghost" id="earningsTodayBtn">Actual</button>
          </div>
        </div>
        <div class="earnings-body" id="earningsBody">
          <span class="earnings-total" id="earningsTotal">$0</span>
          <span class="earnings-caption" id="earningsCaption">Cargando…</span>
        </div>
      </div>

      <div class="section-block">
        <div class="toolbar">
          <h2 class="section-title" style="margin-bottom:0;">Agenda de hoy</h2>
          <a href="agenda.html" class="btn-ghost"><i class="bi bi-calendar3 me-1"></i> Ver agenda completa</a>
        </div>
        <div id="quickAgenda"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js?v=8"></script>
<script src="js/ui.js?v=8"></script>
<script src="js/dashboard.js?v=8"></script>
</body>
</html>
